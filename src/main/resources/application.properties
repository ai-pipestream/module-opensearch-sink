quarkus.application.name=opensearch-sink

# Production port allocation — gRPC shares this port in unified server mode.
quarkus.http.port=19004
quarkus.http.host=0.0.0.0

# Unified Vert.x server: gRPC + standard/grpc health on quarkus.http.port.
# pipestream-server supplies ModuleWorkService stubs and registration defaults.
quarkus.grpc.server.use-separate-server=false
quarkus.grpc.server.health.enabled=true
quarkus.grpc.server.grpc-health.enabled=true

# HTTP/2 windows for unified-mode bidi (StreamDocuments) under load — see
# quarkus grpc-reference "Unified server mode" and pipestream-server defaults.
quarkus.http.initial-window-size=104857600
quarkus.http.http2-connection-window-size=104857600

# ======================================================================================================================
# Kafka Ingress & Emitter Configuration
# ======================================================================================================================
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
%dev.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
kafka.group.id=opensearch-sink

# ======================================================================================================================
# Repository Service gRPC Client
# ======================================================================================================================
quarkus.grpc.clients.repository.host=repository
quarkus.grpc.clients.repository.name-resolver=stork
quarkus.stork.repository.service-discovery.type=consul
quarkus.stork.repository.service-discovery.consul-host=${CONSUL_HOST:localhost}
quarkus.stork.repository.service-discovery.consul-port=${CONSUL_PORT:8500}
quarkus.grpc.clients.repository.max-inbound-message-size=1073741824
quarkus.grpc.clients.repository.flow-control-window=104857600


# OpenSearch Manager service name (Consul-based discovery via Stork)
module.opensearch-sink.manager-service=opensearch-manager
module.opensearch-sink.index-plan-service=opensearch-manager

# Consul configuration for Stork service discovery
pipestream.consul.host=${CONSUL_HOST:localhost}
pipestream.consul.port=${CONSUL_PORT:8500}

# gRPC clients for the OpenSearch Manager (plain stubs + Stork name resolver)
quarkus.grpc.clients.opensearch-manager.host=opensearch-manager
quarkus.grpc.clients.opensearch-manager.name-resolver=stork
quarkus.stork."opensearch-manager".service-discovery.type=consul
quarkus.stork."opensearch-manager".service-discovery.consul-host=${CONSUL_HOST:localhost}
quarkus.stork."opensearch-manager".service-discovery.consul-port=${CONSUL_PORT:8500}

# ======================================================================================================================
# Worker loop (demand-pull from engine via ModuleWorkService)
# ======================================================================================================================
pipestream.module.worker-loop.enabled=true
pipestream.module.worker-loop.module-id=opensearch-sink
pipestream.module.worker-loop.min-concurrency=1
# Capped at 8 (was 20). Engine repo-service hydration path is single-
# threaded; 20 concurrent bidi streams from this sink overwhelmed it.
# Raise via env var only after engine→repo-service is multi-channel.
pipestream.module.worker-loop.concurrency=${OPENSEARCH_SINK_WORKER_MAX_CONCURRENCY:8}
pipestream.module.worker-loop.no-work-retry-after=${OPENSEARCH_SINK_IDLE_POLL_INTERVAL:3s}
%test.pipestream.module.worker-loop.enabled=false

quarkus.index-dependency.pipestream-server.group-id=ai.pipestream
quarkus.index-dependency.pipestream-server.artifact-id=pipestream-server
quarkus.index-dependency.pipestream-module-runtime.group-id=ai.pipestream
quarkus.index-dependency.pipestream-module-runtime.artifact-id=pipestream-module-runtime

# Engine gRPC client + Stork/Consul (demand-pull dial target)
quarkus.grpc.clients.engine.host=engine
quarkus.grpc.clients.engine.name-resolver=stork
quarkus.stork.engine.service-discovery.type=consul
quarkus.stork.engine.service-discovery.consul-host=${CONSUL_HOST:localhost}
quarkus.stork.engine.service-discovery.consul-port=${CONSUL_PORT:8500}
quarkus.stork.engine.service-discovery.refresh-period=30S

# ======================================================================================================================
# Pipestream Service Registration Configuration
# ======================================================================================================================
pipestream.server.class=module
pipestream.registration.type=MODULE
pipestream.registration.mode=grpc
pipestream.registration.description=OpenSearch vector indexing sink with organic schema management via opensearch-manager
pipestream.registration.capabilities=vector-indexing,opensearch,dynamic-schema,sink
pipestream.registration.tags=opensearch,sink,vector,indexing,module

# Inline module registration (replaces GetServiceRegistration gRPC callback)
pipestream.registration.module.display-name=OpenSearch Sink
pipestream.registration.module.description=OpenSearch vector indexing sink with organic schema management
pipestream.registration.module.health-check-passed=true
pipestream.registration.module.health-check-message=OpenSearch sink module is healthy
pipestream.registration.module.json-config-schema-path=classpath:opensearch-sink-options.json

# Disable for tests
%test.pipestream.registration.enabled=false

# Module configuration
module.name=opensearch-sink
module.type=sink
module.description=OpenSearch vector indexing sink with organic schema management

# Health check configuration - use localhost for local development
module.health.check.host=localhost

# Logging Configuration - reduce noise
quarkus.log.level=INFO
quarkus.log.category."ai.pipestream".level=DEBUG
quarkus.log.category."io.vertx.ext.consul".level=WARN
quarkus.log.category."io.quarkus.grpc".level=WARN

# Context path: module under /modules/<name> (parser is reference)

# Test settings - use random port to avoid conflicts
%test.quarkus.http.port=0
%test.quarkus.http.test-port=0

# Processing buffer configuration (for interceptor testing)
processing.buffer.enabled=false
processing.buffer.capacity=100
processing.buffer.directory=target/test-data
processing.buffer.prefix=opensearch-sink

# Enable buffer in dev mode for testing
%dev.processing.buffer.enabled=true

# OpenSearch Configuration
# Dev/prod use env vars or compose; test profile relies on DevServices
%dev.opensearch.hosts=${OPENSEARCH_HOST:localhost}:${OPENSEARCH_PORT:9200}
%prod.opensearch.hosts=${OPENSEARCH_HOST:localhost}:${OPENSEARCH_PORT:9200}
%dev.opensearch.protocol=http
%prod.opensearch.protocol=http
%dev.opensearch.username=${OPENSEARCH_USERNAME:}
%prod.opensearch.username=${OPENSEARCH_USERNAME:}
%dev.opensearch.password=${OPENSEARCH_PASSWORD:}
%prod.opensearch.password=${OPENSEARCH_PASSWORD:}
opensearch.connection-timeout=5000
opensearch.socket-timeout=10000
opensearch.max-connections=20
opensearch.ssl-verify=false
opensearch.ssl-verify-hostname=false

# Test profile OpenSearch configuration (OpensearchContainerTestResource overrides hosts)
%test.opensearch.protocol=http

%dev.quarkus.http.port=19104
